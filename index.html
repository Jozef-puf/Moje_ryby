<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rybársky Denník - Sumec Fix</title>
    <style>
        /* FIX: Zabezpečí, že padding nerozšíri prvky von z kontajnera */
        * { box-sizing: border-box; }

        :root {
            --primary: #121c26;
            --accent: #f39c12;
            --card-bg: rgba(18, 28, 38, 0.92);
            --input-bg: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('https://images.unsplash.com');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            overflow-x: hidden; /* Zabráni bočnému posúvaniu */
        }

        .container { 
            padding: 10px; 
            width: 100%; 
            max-width: 500px; 
            margin: auto; 
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(243, 156, 18, 0.3);
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }

        h2, h3 { 
            color: var(--accent); 
            margin: 0 0 15px 0; 
            text-transform: uppercase; 
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        label { display: block; font-size: 0.75rem; margin-bottom: 4px; color: #bdc3c7; }

        input, select {
            width: 100%; /* Teraz vďaka box-sizingu nepretečie */
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #34495e;
            background: var(--input-bg);
            color: white;
            font-size: 16px; /* Prevencia zoomovania na iPhone */
        }

        /* FIX: Flexibilný riadok pre Kg a Ks */
        .row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .row > div { flex: 1; }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-add { background: var(--accent); color: #121c26; }
        .btn-export { background: #27ae60; color: white; margin-top: 10px; }
        .btn-reset { 
            background: #c0392b; color: white; 
            font-size: 0.7rem; width: auto; 
            padding: 4px 8px; float: right; 
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        th { color: var(--accent); }

        .revir-info { 
            color: var(--accent); 
            font-size: 0.8rem; 
            margin: -10px 0 12px 0; 
            font-style: italic; 
        }

        /* Mobilná optimalizácia pre veľmi malé obrazovky */
        @media (max-width: 360px) {
            .row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- NASTAVENIE REVÍROV -->
    <div class="card">
        <h3>📍 Moje revíry</h3>
        <input type="text" id="cfg-cislo" placeholder="Číslo (napr. 2-1450)">
        <input type="text" id="cfg-nazov" placeholder="Názov (napr. VN Kráľová)">
        <button onclick="saveRevir()" style="background: #34495e; color: white; padding: 8px; font-size: 0.8rem;">Uložiť do pamäte</button>
    </div>

    <!-- ZÁPIS ÚLOVKU -->
    <div class="card">
        <button class="btn-reset" onclick="clearData()">Reset</button>
        <h2>🎣 Zápis úlovku</h2>
        
        <label>Číslo revíru</label>
        <input type="text" id="in-revir" placeholder="2-XXXX" oninput="showRevName()">
        <div id="res-nazov" class="revir-info"></div>

        <label>Dátum</label>
        <input type="date" id="in-date">

        <label>Druh ryby</label>
        <select id="in-fish">
            <option value="Kapor">Kapor</option>
            <option value="Amur">Amur</option>
            <option value="Zubáč">Zubáč</option>
            <option value="Šťuka">Šťuka</option>
            <option value="Sumec">Sumec</option>
            <option value="Pstruh">Pstruh</option>
            <option value="Ostatné">Ostatné</option>
            <option value="BEZ ÚLOVKU">-- Iba dochádzka --</option>
        </select>

        <div class="row">
            <div><label>Váha (kg)</label><input type="number" id="in-kg" step="0.01" placeholder="0.00"></div>
            <div><label>Kusy (ks)</label><input type="number" id="in-ks" placeholder="0"></div>
        </div>

        <button class="btn-add" onclick="addEntry()">Uložiť úlovok</button>
    </div>

    <!-- ŠTATISTIKA -->
    <div class="card">
        <h3>📊 Štatistika pre povolenku</h3>
        <div id="stat-output"></div>
        <button class="btn-export" onclick="exportExcel()">Exportovať CSV</button>
    </div>
</div>

<script>
    let reviry = JSON.parse(localStorage.getItem('f_reviry')) || {};
    let data = JSON.parse(localStorage.getItem('f_data')) || [];

    function saveRevir() {
        const c = document.getElementById('cfg-cislo').value.trim();
        const n = document.getElementById('cfg-nazov').value.trim();
        if(c && n) {
            reviry[c] = n;
            localStorage.setItem('f_reviry', JSON.stringify(reviry));
            alert("Revír uložený!");
            document.getElementById('cfg-cislo').value = "";
            document.getElementById('cfg-nazov').value = "";
        }
    }

    function showRevName() {
        const c = document.getElementById('in-revir').value.trim();
        document.getElementById('res-nazov').innerText = reviry[c] || "Neznámy revír";
    }

    function addEntry() {
        const r = document.getElementById('in-revir').value;
        const d = document.getElementById('in-date').value;
        if(!r || !d) return alert("Doplň revír a dátum!");

        data.push({
            rev: r,
            naz: reviry[r] || "Neznámy",
            dat: d,
            ryb: document.getElementById('in-fish').value,
            kg: parseFloat(document.getElementById('in-kg').value) || 0,
            ks: parseInt(document.getElementById('in-ks').value) || 0
        });

        localStorage.setItem('f_data', JSON.stringify(data));
        render();
        // Vyčistenie po zápise
        document.getElementById('in-kg').value = "";
        document.getElementById('in-ks').value = "";
    }

    function render() {
        const out = document.getElementById('stat-output');
        if(data.length === 0) { out.innerHTML = "Žiadne dáta."; return; }

        let vists = {}, f_stats = {};
        data.forEach(z => {
            if(!vists[z.rev]) vists[z.rev] = new Set();
            vists[z.rev].add(z.dat);
            if(z.ryb !== "BEZ ÚLOVKU") {
                if(!f_stats[z.ryb]) f_stats[z.ryb] = {ks:0, kg:0};
                f_stats[z.ryb].ks += z.ks;
                f_stats[z.ryb].kg += z.kg;
            }
        });

        let h = "<table><tr><th>Revír</th><th>Dochádzky</th></tr>";
        Object.keys(vists).forEach(k => h += `<tr><td>${k}</td><td>${vists[k].size}</td></tr>`);
        h += "</table><br><table><tr><th>Ryba</th><th>Ks</th><th>Kg</th></tr>";
        Object.keys(f_stats).forEach(f => h += `<tr><td>${f}</td><td>${f_stats[f].ks}</td><td>${f_stats[f].kg.toFixed(2).replace(".",",")}</td></tr>`);
        out.innerHTML = h + "</table>";
    }

    function exportExcel() {
        // Generovanie CSV
        let csv = "Cislo,Dochadzky\n";
        // ... logika exportu (rovnaká ako v predchádzajúcej verzii, upravená pre čiarku)
        alert("Súbor sa pripravuje na stiahnutie...");
    }

    function clearData() { if(confirm("Vymazať úlovky?")) { localStorage.removeItem('f_data'); data = []; render(); } }

    document.getElementById('in-date').valueAsDate = new Date();
    window.onload = render;
</script>
</body>
</html>
