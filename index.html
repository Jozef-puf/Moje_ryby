<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rybársky Denník - Sumec Fix</title>
<!-- Ikona pre plochu iPhonu -->
<link rel="apple-touch-icon" href="https://jozef-puf.github.io/Moje_ryby/Icon_ryby.png">
    <link rel="icon" type="image/png" href="https://jozef-puf.github.io/Moje_ryby/Icon_ryby.png">
<!-- Názov aplikácie pod ikonou -->
<meta name="apple-mobile-web-app-title" content="Môj Rybár">
<!-- Skrytie lišty prehliadača pre vzhľad skutočnej appky -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { box-sizing: border-box; }
        :root {
            --primary: #121c26;
            --accent: #f39c12;
            --card-bg: rgba(18, 28, 38, 0.95);
            --input-bg: #2c3e50;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            background: #000 url('https://images.unsplash.com') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            overflow-x: hidden;
        }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(243, 156, 18, 0.3);
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2, h3 { color: var(--accent); margin: 0 0 12px 0; text-transform: uppercase; font-size: 0.95rem; letter-spacing: 0.5px; }
        label { display: block; font-size: 0.7rem; margin-bottom: 4px; color: #bdc3c7; }
        
        input, select {
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 6px;
            border: 1px solid #34495e; background: var(--input-bg); color: white; font-size: 16px;
        }
        
        .row { display: flex; gap: 8px; width: 100%; }
        .row > div { flex: 1; }
        
        button {
            width: 100%; padding: 14px; border-radius: 8px; border: none;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .btn-add { background: var(--accent); color: #121c26; margin-top: 5px; }
        .btn-export { background: #27ae60; color: white; margin-top: 15px; }
        .btn-del { 
            background: #e74c3c; color: white; padding: 6px 10px; 
            border-radius: 6px; font-size: 0.7rem; width: auto; font-weight: bold;
        }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        th, td { padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        th { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; }
        
        .revir-info { color: var(--accent); font-size: 0.8rem; margin: -8px 0 12px 0; font-style: italic; min-height: 1.1rem; }
        .stat-section { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px; padding-top: 15px; }
        
        .txt-small { font-size: 0.7rem; color: #bdc3c7; }
        .txt-accent { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <!-- REVíRY -->
    <div class="card">
        <h3>📍 Moje revíry</h3>
        <div class="row">
            <div><input type="text" id="cfg-c" placeholder="2-1450"></div>
            <div><input type="text" id="cfg-n" placeholder="VN Kráľová"></div>
        </div>
        <button onclick="saveRevir()" style="background: #34495e; color: white; padding: 10px; font-size: 0.75rem;">Uložiť do databázy</button>
    </div>

    <!-- NOVÝ ZÁPIS -->
    <div class="card">
        <h2>🎣 Zápis úlovku</h2>
        <label>Číslo revíru</label>
        <input type="text" id="in-revir" list="list-reviry" placeholder="2-XXXX" oninput="showRevName()">
        <datalist id="list-reviry"></datalist>
        <div id="res-nazov" class="revir-info"></div>

        <div class="row">
            <div><label>Dátum</label><input type="date" id="in-date"></div>
            <div>
                <label>Druh ryby</label>
                <select id="in-fish">
                    <option value="Kapor">Kapor</option>
                    <option value="Amur">Amur</option>
                    <option value="Zubáč">Zubáč</option>
                    <option value="Šťuka">Šťuka</option>
                    <option value="Sumec">Sumec</option>
                    <option value="Pstruh">Pstruh</option>
                    <option value="Ostatné">Ostatné</option>
                    <option value="BEZ ÚLOVKU">-- Iba dochádzka --</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div><label>Váha (kg)</label><input type="text" id="in-kg" placeholder="0,00" inputmode="decimal"></div>
            <div><label>Kusy (ks)</label><input type="number" id="in-ks" placeholder="0"></div>
        </div>

        <button class="btn-add" onclick="addEntry()">Zapísať úlovok</button>
    </div>

    <!-- ŠTATISTIKA -->
    <div class="card">
        <h3>📊 Sumár pre povolenku</h3>
        <div id="stat-sumar"></div>
        
        <div class="stat-section">
            <h3>📜 Posledné zápisy (Zmazať)</h3>
            <div id="stat-list"></div>
        </div>

        <button class="btn-export" onclick="exportCSV()">📥 Exportovať CSV (Excel)</button>
        <button onclick="clearData()" style="background:none; color:#666; border:none; width:100%; margin-top:25px; font-size:0.65rem;">Resetovať celú aplikáciu</button>
    </div>
</div>

<script>
    let reviry = JSON.parse(localStorage.getItem('f_reviry')) || {};
    let data = JSON.parse(localStorage.getItem('f_data')) || [];

    // Inicializácia pri otvorení
    updateDatalist();
    render();
    document.getElementById('in-date').valueAsDate = new Date();

    function updateDatalist() {
        const dl = document.getElementById('list-reviry');
        dl.innerHTML = "";
        Object.keys(reviry).forEach(c => {
            let o = document.createElement('option'); o.value = c;
            dl.appendChild(o);
        });
    }

    function saveRevir() {
        const c = document.getElementById('cfg-c').value.trim();
        const n = document.getElementById('cfg-n').value.trim();
        if(c && n) {
            reviry[c] = n;
            localStorage.setItem('f_reviry', JSON.stringify(reviry));
            updateDatalist();
            alert("Revír bol pridaný.");
            document.getElementById('cfg-c').value = ""; document.getElementById('cfg-n').value = "";
        }
    }

    function showRevName() {
        const c = document.getElementById('in-revir').value.trim();
        document.getElementById('res-nazov').innerText = reviry[c] || "Neznámy/Nový revír";
    }

    function addEntry() {
        const r = document.getElementById('in-revir').value.trim();
        const d = document.getElementById('in-date').value;
        if(!r || !d) return alert("Chýba revír alebo dátum!");

        data.push({
            rev: r,
            naz: reviry[r] || "Neznámy",
            dat: d,
            ryb: document.getElementById('in-fish').value,
            kg: parseFloat(document.getElementById('in-kg').value.replace(",", ".")) || 0,
            ks: parseInt(document.getElementById('in-ks').value) || 0
        });

        localStorage.setItem('f_data', JSON.stringify(data));
        render();
        // Reset polí
        document.getElementById('in-kg').value = "";
        document.getElementById('in-ks').value = "";
    }

    function deleteEntry(index) {
        if(confirm("Naozaj chcete tento riadok vymazať?")) {
            data.splice(index, 1);
            localStorage.setItem('f_data', JSON.stringify(data));
            render();
        }
    }

    function render() {
        const outSum = document.getElementById('stat-sumar');
        const outList = document.getElementById('stat-list');
        if(data.length === 0) { 
            outSum.innerHTML = "<p class='txt-small'>Žiadne údaje v denníku.</p>"; 
            outList.innerHTML = "";
            return; 
        }

        // 1. VÝPOČET ŠTATISTIKY (PRE LÍSTOK)
        let vists = {}, f_stats = {};
        data.forEach(z => {
            if(!vists[z.rev]) vists[z.rev] = new Set();
            vists[z.rev].add(z.dat);
            if(z.ryb !== "BEZ ÚLOVKU") {
                if(!f_stats[z.ryb]) f_stats[z.ryb] = {ks:0, kg:0};
                f_stats[z.ryb].ks += z.ks;
                f_stats[z.ryb].kg += z.kg;
            }
        });

        let h = "<table><tr><th>Revír</th><th>Dochádzky</th></tr>";
        Object.keys(vists).forEach(k => h += `<tr><td class='txt-accent'>${k}</td><td>${vists[k].size}</td></tr>`);
        h += "</table><br><table><tr><th>Ryba</th><th>Ks</th><th>Kg</th></tr>";
        Object.keys(f_stats).forEach(f => h += `<tr><td>${f}</td><td>${f_stats[f].ks}</td><td>${f_stats[f].kg.toFixed(2).replace(".",",")}</td></tr>`);
        outSum.innerHTML = h + "</table>";

        // 2. ZOZNAM PRE MAZANIE (S REVÍROM)
        let l = "<table><tr><th>Dátum</th><th>Revír</th><th>Ryba</th><th></th></tr>";
        data.slice().reverse().forEach((z, i) => {
            const realIdx = data.length - 1 - i;
            l += `<tr>
                <td class='txt-small'>${z.dat.split('-').reverse().join('.')}</td>
                <td class='txt-accent' style='font-size:0.7rem'>${z.rev}</td>
                <td>${z.ryb}</td>
                <td style='text-align:right'><button class="btn-del" onclick="deleteEntry(${realIdx})">X</button></td>
            </tr>`;
        });
        outList.innerHTML = l + "</table>";
    }

    function exportCSV() {
        if(data.length === 0) return alert("Zoznam je prázdny.");
        let csv = "\uFEFFDátum;Revír;Názov;Ryba;Váha_Kg;Kusy\n";
        data.forEach(z => {
            csv += `${z.dat.split('-').reverse().join('.')};${z.rev};${z.naz};${z.ryb};${z.kg.toString().replace(".", ",")};${z.ks}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "RybarskyDennik.csv";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    function clearData() { if(confirm("Pozor! Toto vymaže všetky úlovky natrvalo. Pokračovať?")) { localStorage.removeItem('f_data'); data = []; render(); } }
</script>

</body>
</html>
